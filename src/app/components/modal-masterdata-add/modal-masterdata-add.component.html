<!-- <div class="modal-overlay"></div> -->

<form [formGroup]="form">
  <!-- <div class="modal fade" tabindex="-1" role="dialog" aria-labelledby="modalLabel" aria-hidden="true" #modalElement> -->
  <div class="modal fade" tabindex="-1" role="dialog" #modalElement (click)="onBackdropClick($event)">

    <div class="modal-dialog modal-md modal-dialog-centered" role="document">
      <div class="modal-content">
        <!-- Header -->
        <div class="modal-header bg-dark-blue text-white">
          <h5 class="modal-title fw-bold" id="modalLabel">
            {{ "master_modal_header2" | translate}}
          </h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="closeModal()"></button>
        </div>

        <!-- Body -->
        <div class="modal-body overflow-auto p-0">
          <div class="bg-light-green">
            <p class="fw-bold mb-3 ps-3">
              {{ "master_modal_title1" | translate }}
            </p>
          </div>

          <div class="container">
            <div class="row g-3 mb-4">
              <!-- รหัสอ้างอิง -->
              <div class="col-12 col-md-12 col-lg-6">
                <label for="byte_code" class="form-label ps-2" [appRequiredMarker]="form.get('byte_code')">{{ "master_modal_bytecode" | translate }} </label>
                <input type="text" id="byte_code" class="form-control" formControlName="byte_code"
                  [placeholder]="'placeholder_text' | translate" />
                  <div *ngIf="form.get('byte_code')?.invalid && form.get('byte_code')?.touched" class="text-danger ps-2">
                    {{ "alert_enterData" | translate }}
                  </div>
              </div>

              <!-- ประเภทอ้างอิง -->
              <div class="col-12 col-md-12 col-lg-6">
                <label for="email" class="form-label ps-2" [appRequiredMarker]="form.get('byte_reference')">{{ "master_modal_byteref" | translate }} </label>
                <input type="text" id="email" class="form-control" formControlName="byte_reference"
                  [placeholder]="'placeholder_text' | translate" />
                  <div *ngIf="form.get('byte_reference')?.invalid && form.get('byte_reference')?.touched" class="text-danger ps-2">
                    {{ "alert_enterData" | translate }}
                  </div>
              </div>

            </div>
          </div>

          <div class="bg-light-green">
            <p class="fw-bold mb-0 ps-3">
              {{ "master_modal_title2" | translate}}
            </p>
          </div>

          <div class="mb-3"></div>

          <div class="container">
            <div class="row g-3 mb-3">
              <div class="col-12 col-md-12 col-lg-12">
                <label for="lastname" class="form-label ps-2" [appRequiredMarker]="form.get('byte_desc_en')">{{"master_modal_engdesc" | translate }} </label>
                <input type="text" id="lastname" class="form-control" formControlName="byte_desc_en"
                  [placeholder]="'placeholder_text' | translate" />
                  <div *ngIf="form.get('byte_desc_en')?.invalid && form.get('byte_desc_en')?.touched" class="text-danger ps-2">
                    {{ "alert_enterData" | translate }}
                  </div>
              </div>

              <!-- ชื่ออ้างอิงภาษาไทย -->
              <div class="col-12 col-md-12 col-lg-12">
                <label for="byte_desc_th" class="form-label ps-2" [appRequiredMarker]="form.get('byte_desc_th')">{{ "master_modal_thaidesc" | translate }} </label>
                <input type="text" id="byte_desc_th" class="form-control" formControlName="byte_desc_th"
                  [placeholder]="'placeholder_text' | translate" />
                  <div *ngIf="form.get('byte_desc_th')?.invalid && form.get('byte_desc_th')?.touched" class="text-danger ps-2">
                    {{ "alert_enterData" | translate }}
                  </div>
              </div>

            </div>
          </div>
        </div>


        <!-- Submit Button -->
        <div class="d-flex justify-content-center pt-3 mb-4">
          <button type="button" class="btn btn-primary" (click)="onSave()">
            <i class="bi bi-floppy-fill me-2"></i>
            {{ "uploadscore_saveData" | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</form>
